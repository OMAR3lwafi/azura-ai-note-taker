# Azora AI NoteTaker - Comprehensive Codebase Analysis

## Project Overview

project:
  name: "Azora AI NoteTaker"
  language: "TypeScript"
  frameworks:
    backend: "Supabase + Deno + Hono (Edge Functions)"
    frontend: "React 18 + Vite + Tailwind v4 + ShadCN UI"
  architecture: "Serverless Edge Functions + RLS-secured Postgres + React SPA"
  structure: |
    Monorepo with separate backend (Supabase Edge) and frontend (Vite React)
    - Backend: supabase/functions/ (Deno + Hono)
    - Frontend: Frontend/ (React + TypeScript)
    - Docs: Doc/, .windsurf/rules/
    - Infrastructure: Makefile, deno.json, package.json

## Patterns Discovery

patterns:
  
  naming:
    files:
      backend: "lowercase_snake_case.ts (_shared/auth.ts, _shared/database.ts)"
      frontend: "PascalCase.tsx for components, camelCase.ts for utils"
      migrations: "YYYYMMDDHHMMSS_description.sql"
      examples:
        - "supabase/functions/_shared/auth.ts"
        - "Frontend/src/components/auth/ProtectedRoute.tsx"
        - "supabase/migrations/20240101000003_core.sql"
    
    functions:
      backend: "camelCase for functions (requireAuth, getUserId, executeQuery)"
      frontend: "camelCase for functions, PascalCase for components"
      constants: "UPPER_SNAKE_CASE (THEME_STORAGE_KEY, CORS_ORIGIN)"
    
    database:
      tables: "lowercase plural nouns (meetings, segments, ai_suggestions)"
      columns: "snake_case (owner_id, display_name, started_at)"
      rpc_functions: "snake_case (calculate_talk_time, search_segments_semantic)"
    
    routes:
      pattern: "/auth/*, /v1/*, /webhooks/*"
      versioning: "Explicit API versioning (/v1/meetings)"
      examples:
        - "GET/PUT /auth/profile"
        - "POST /v1/meetings"
        - "POST /webhooks/stt"

  architecture:
    
    backend_layers:
      routing: "Hono app with middleware chain"
      middleware_stack:
        - "cors (CORS headers)"
        - "withRequestId (structured logging)"
        - "requireAuth (JWT/API key validation)"
        - "requireScope (optional API key scope enforcement)"
        - "require2FA (optional 2FA verification)"
      
      shared_modules:
        location: "supabase/functions/_shared/"
        modules:
          - "auth.ts - Authentication middleware"
          - "cors.ts - CORS configuration"
          - "logging.ts - Structured logging + request ID"
          - "database.ts - Query execution wrappers"
          - "validation.ts - Zod schemas"
          - "context.ts - Request context helpers"
          - "ai.ts - AI/LLM integration"
          - "embeddings.ts - Vector embeddings"
          - "exports.ts - Export generation"
          - "integrations.ts - Third-party integrations"
          - "search.ts - Search implementations"
          - "speakers.ts - Speaker analytics"
          - "stt.ts - STT token generation"
          - "kv.ts - KV store operations"
      
      data_flow: |
        Request → CORS → RequestID → Auth → Route Handler → 
        Shared Module → Database (with RLS) → Response
      
      error_handling:
        pattern: "Custom DatabaseError class with try-catch wrapping"
        response_format: |
          {
            "code": "error_type",
            "message": "Human-readable message",
            "errors": [...] // Optional validation errors
          }
    
    frontend_architecture:
      structure: "Component-based with hooks pattern"
      state_management: "React Context (useAuth) + local useState"
      routing: "Tab-based navigation (no react-router in App.tsx)"
      
      component_organization:
        - "components/ - Screen-level components"
        - "components/auth/ - Authentication screens"
        - "components/session/ - Recording session UI"
        - "components/gallery/ - Meeting list/detail"
        - "components/ui/ - ShadCN design system"
        - "components/luxury/ - Luxury theme variants"
        - "components/modern/ - Modern theme variants"
      
      hooks_pattern:
        location: "Frontend/src/hooks/"
        examples:
          - "useAuth.tsx - Authentication context & operations"
          - "useSTT.tsx - Speech-to-text WebSocket"
      
      styling_approach:
        framework: "Tailwind CSS v4"
        utilities: "cn() utility from class-variance-authority"
        design_tokens: "CSS variables (--primary, --glass-background)"
        theme_system: "Luxury vs Modern themes with variant components"
        rtl_support: "dir attribute + isRTL conditional styling"
    
    database_patterns:
      rls_enforcement: "Row-level security on all tables (owner_id checks)"
      ownership_verification: |
        Always verify owner_id = userId before operations:
        supa.from("meetings").select("owner_id").eq("id", id).eq("owner_id", userId)
      
      migrations_strategy:
        - "Sequential numbered migrations"
        - "Extensions first (vector, unaccent, uuid-ossp)"
        - "Tables with foreign keys + indexes"
        - "Generated columns (tsvector)"
        - "RLS policies after table creation"
      
      search_implementations:
        full_text: "to_tsvector('simple', unaccent(text)) + GIN index"
        trigram: "pg_trgm similarity search"
        semantic: "pgvector with IVFFLAT index (1536 dimensions)"
      
      indexes:
        composite: "meetings(owner_id, started_at desc)"
        time_based: "segments(meeting_id, start_ms)"
        specialized: "segments.tsv GIN, segments.embedding IVFFLAT"

  testing:
    framework: "Deno test (backend), planned React Testing Library (frontend)"
    structure: "No dedicated test/ directory yet - tests planned inline"
    commands:
      backend: "cd supabase/functions && deno test --allow-all"
      frontend: "cd Frontend && npm test"
      all: "npm run test (runs both)"
    
    patterns_to_implement:
      - "Unit tests for middlewares (requireAuth, validation)"
      - "RLS verification tests"
      - "Contract tests for API responses"
      - "E2E with Playwright"
      - "Property-based tests for temporal ordering"

  integration_patterns:
    
    authentication_flow:
      supabase_auth: "Email OTP + OAuth (Google/Apple)"
      jwt_validation: "getUserFromToken() via Supabase client"
      api_keys: "Scoped keys with azora_ prefix"
      device_tracking: "X-Device-ID, X-Platform headers"
      context_injection: "c.set('user', ...), c.set('userId', ...)"
    
    realtime_updates:
      mechanism: "Supabase Realtime subscriptions"
      tables: "ai_suggestions, tasks, segments (planned)"
      client_pattern: |
        supabase
          .channel('meeting:123')
          .on('postgres_changes', ...)
          .subscribe()
    
    external_services:
      stt_providers: "Deepgram/AssemblyAI/Google/OpenAI (webhook-based)"
      llm: "OpenAI/Anthropic for summarization"
      integrations: "Notion, Trello, MS To-Do (REST APIs)"
      
      webhook_pattern: |
        POST /webhooks/stt
        - Verify HMAC/signature
        - Normalize provider payload
        - Batch insert segments
        - Return 200 OK
    
    export_generation:
      formats: "Markdown, TXT, HTML (PDF planned)"
      storage: "Supabase Storage with signed URLs"
      pattern: |
        1. Generate export content
        2. Upload to storage bucket
        3. Record in assets table
        4. Return signed URL

  validation:
    library: "Zod schemas"
    location: "supabase/functions/_shared/validation.ts"
    pattern: |
      const schema = z.object({ ... });
      const validation = schema.safeParse(body);
      if (!validation.success) {
        return c.json({ code: "validation_error", errors: validation.error.errors }, 400);
      }
    
    schemas_defined:
      - "CreateMeetingSchema"
      - "UpdateProfileSchema"
      - "BatchSegmentsSchema"
      - "SummarizeSchema"
      - "ExportSchema"
      - "IntegrationPushSchema"
      - "SearchQuerySchema"
      - "SemanticSearchQuerySchema"

  internationalization:
    library: "Custom i18n system"
    location: "Frontend/src/lib/i18n.ts"
    supported_languages: ["ar", "en"]
    pattern: |
      const translations = { ar: {...}, en: {...} };
      export function t(language: Language, key: string): string
      
      Usage: t('ar', 'session.recording') → 'جاري التسجيل'
    
    rtl_handling: |
      - dir={isRTL ? 'rtl' : 'ltr'} on root
      - className={isRTL ? 'rtl' : 'ltr'}
      - Toaster position: isRTL ? 'top-left' : 'top-right'
      - Icon mirroring in progress

## Similar Implementations

similar_implementations:
  
  - file: "supabase/functions/_shared/auth.ts"
    relevance: "Auth middleware pattern - template for any protected route"
    pattern: |
      export const requireAuth: MiddlewareHandler = async (c, next) => {
        // 1. Extract Bearer token
        // 2. Try API key first (azora_ prefix)
        // 3. Fall back to JWT validation
        // 4. Inject user context: c.set('user', ...), c.set('userId', ...)
        // 5. Track device metadata
        await next();
      }
    usage: "app.use('/v1/*', requireAuth)"
  
  - file: "supabase/functions/_shared/database.ts"
    relevance: "Database query execution with error handling"
    pattern: |
      export async function executeQuery<T>(query: PromiseLike<{data, error}>): Promise<T> {
        const { data, error } = await query;
        if (error) throw new DatabaseError(error.message, error.code);
        if (!data) throw new DatabaseError("No data returned");
        return data;
      }
    usage: "const meeting = await executeQuery(supa.from('meetings').select(...).single())"
  
  - file: "supabase/functions/api/index.ts:145-223"
    relevance: "Standard CRUD endpoint pattern"
    pattern: |
      app.post("/v1/meetings", async (c) => {
        const userId = getUserId(c);
        const body = await c.req.json().catch(() => ({}));
        
        // Validate with Zod
        const validation = CreateMeetingSchema.safeParse(body);
        if (!validation.success) {
          return c.json({ code: "validation_error", ... }, 400);
        }
        
        // Execute with ownership
        const data = await executeQuery(
          supa.from("meetings").insert({ owner_id: userId, ...validation.data }).select().single()
        );
        
        return c.json(data);
      });
  
  - file: "Frontend/src/hooks/useAuth.tsx"
    relevance: "Context-based state management pattern"
    pattern: |
      const AuthContext = createContext<AuthContextType | undefined>(undefined);
      
      export function AuthProvider({ children }) {
        const [user, setUser] = useState<User | null>(null);
        
        useEffect(() => {
          supabase.auth.getSession()...
          const { data: { subscription } } = supabase.auth.onAuthStateChange(...)
          return () => subscription.unsubscribe();
        }, []);
        
        return <AuthContext.Provider value={{...}}>{children}</AuthContext.Provider>;
      }
      
      export function useAuth() {
        const context = useContext(AuthContext);
        if (!context) throw new Error('useAuth must be within AuthProvider');
        return context;
      }
  
  - file: "Frontend/src/components/ui/button.tsx"
    relevance: "ShadCN component pattern with CVA"
    pattern: |
      const buttonVariants = cva("base-classes", {
        variants: {
          variant: { default: "...", glass3d: "...", ... },
          size: { default: "...", sm: "...", ... }
        },
        defaultVariants: { variant: "default", size: "default" }
      });
      
      function Button({ className, variant, size, asChild, ...props }) {
        const Comp = asChild ? Slot : "button";
        return <Comp className={cn(buttonVariants({ variant, size, className }))} {...props} />;
      }
  
  - file: "Frontend/src/components/auth/ProtectedRoute.tsx"
    relevance: "Route protection pattern"
    pattern: |
      export function ProtectedRoute({ children }) {
        const { user, loading } = useAuth();
        
        if (loading) return <LoadingSpinner />;
        if (!user) return <Navigate to="/login" replace />;
        
        return <>{children}</>;
      }
  
  - file: "supabase/migrations/20240101000003_core.sql"
    relevance: "Migration pattern with RLS + indexes"
    pattern: |
      -- 1. Extensions
      create extension if not exists vector;
      
      -- 2. Tables with foreign keys
      create table meetings (
        id uuid primary key default uuid_generate_v4(),
        owner_id uuid not null references auth.users(id) on delete cascade,
        ...
      );
      
      -- 3. Generated columns
      alter table segments
        add column tsv tsvector generated always as (
          to_tsvector('simple', immutable_unaccent(text))
        ) stored;
      
      -- 4. Indexes
      create index segments_tsv_gin on segments using gin(tsv);
      
      -- 5. RLS policies
      alter table meetings enable row level security;
      create policy "own_meetings" on meetings
        for all using (owner_id = auth.uid());

