## Anti-patterns to Avoid

anti_patterns:
  
  - pattern: "Using service_role key on client"
    why: "Exposes full database access, bypasses RLS"
    correct: "Use anon key on client, service_role only on backend"
  
  - pattern: "Skipping RLS ownership checks"
    why: "Users can access other users' data"
    correct: "Always filter by owner_id: .eq('owner_id', userId)"
  
  - pattern: "Unvalidated user input"
    why: "SQL injection, type errors, crashes"
    correct: "Use Zod schemas: schema.safeParse(body)"
  
  - pattern: "Hardcoding credentials"
    why: "Security vulnerability"
    correct: "Use Deno.env.get() and .env.local files"
  
  - pattern: "Synchronous AI calls blocking UI"
    why: "Poor UX, timeouts"
    correct: "Async/await with loading states, background jobs"
  
  - pattern: "Missing error boundaries"
    why: "App crashes on component errors"
    correct: "Wrap critical sections with ErrorBoundary"
  
  - pattern: "Direct database access from components"
    why: "Tight coupling, hard to test"
    correct: "Use hooks (useAuth, useSTT) and API calls"

